services:
  - type: web
    name: dexcom-egv-tester
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build && pnpm db:push
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DEXCOM_CLIENT_ID
        sync: false
      - key: DEXCOM_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
